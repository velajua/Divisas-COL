name: Daily update and deploy

on:
  schedule:
    - cron: "5 10 * * *"
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Generate result.json
        id: generate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python main.py save > run_output.log 2>&1
          CMD_EXIT=$?

          echo "================ PYTHON OUTPUT ================"
          cat run_output.log
          echo "==============================================="

          echo "cmd_exit=$CMD_EXIT" >> "$GITHUB_OUTPUT"

          if grep -Eq 'Failed:[[:space:]]*0/[0-9]+' run_output.log; then
            echo "health_ok=true" >> "$GITHUB_OUTPUT"
            echo "Health summary is OK"
          else
            echo "health_ok=false" >> "$GITHUB_OUTPUT"
            echo "Health summary is NOT OK"
          fi

          exit 0

      - name: Generate entries.json
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from datetime import datetime

          ENTRIES_DIR = "html/entries"
          OUTPUT_FILE = "html/entries.json"

          MONTHS = {
              "ene": 1,
              "feb": 2,
              "mar": 3,
              "abr": 4,
              "may": 5,
              "jun": 6,
              "jul": 7,
              "ago": 8,
              "sep": 9,
              "oct": 10,
              "nov": 11,
              "dic": 12,
          }

          def extract(pattern, text, default=""):
              match = re.search(pattern, text, re.IGNORECASE | re.DOTALL)
              return match.group(1).strip() if match else default

          def clean_html(text):
              text = re.sub(r"<[^>]+>", "", text)
              text = re.sub(r"\s+", " ", text)
              return text.strip()

          def parse_spanish_date(date_text):
              value = (date_text or "").strip().lower()
              match = re.match(r"(\d{1,2})\s+([a-záéíóú]+)\s+(\d{4})", value)
              if not match:
                  return datetime.min

              day = int(match.group(1))
              month_txt = (
                  match.group(2)
                  .replace("á", "a")
                  .replace("é", "e")
                  .replace("í", "i")
                  .replace("ó", "o")
                  .replace("ú", "u")
              )[:3]
              year = int(match.group(3))

              month = MONTHS.get(month_txt)
              if not month:
                  return datetime.min

              return datetime(year, month, day)

          entries = []

          if os.path.isdir(ENTRIES_DIR):
              for filename in os.listdir(ENTRIES_DIR):
                  if not filename.endswith(".html"):
                      continue

                  path = os.path.join(ENTRIES_DIR, filename)

                  with open(path, "r", encoding="utf-8") as f:
                      html = f.read()

                  title = extract(r"<title>(.*?)</title>", html, filename.replace(".html", ""))
                  description = extract(
                      r'<meta\s+name="description"\s+content="(.*?)"\s*/?>',
                      html,
                      ""
                  )
                  date = extract(
                      r'<div class="hero-badge"><span class="dot"></span>\s*(.*?)\s*</div>',
                      html,
                      ""
                  )

                  if not description:
                      first_desc = extract(r'<p class="hero-desc"[^>]*>(.*?)</p>', html, "")
                      description = clean_html(first_desc)

                  title = clean_html(title).replace(" | DiviSAS COL", "").strip()

                  entries.append({
                      "date": date,
                      "title": title,
                      "summary": description,
                      "url": f"entries/{filename}",
                      "_sort_date": parse_spanish_date(date),
                  })

          entries.sort(key=lambda x: x["_sort_date"], reverse=True)

          for entry in entries:
              entry.pop("_sort_date", None)

          with open(OUTPUT_FILE, "w", encoding="utf-8") as f:
              json.dump(entries, f, ensure_ascii=False, indent=2)

          print(f"Generated {OUTPUT_FILE} with {len(entries)} entries")
          PY

      - name: Generate city pages
        if: always()
        run: python generate_city_pages.py

      - name: Apply site domain metadata
        if: always()
        run: python update_site_domain.py

      - name: Commit generated site files if changed
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add html
          git diff --cached --quiet || git commit -m "Update generated site files"
          git push

      - name: Deploy to Firebase Hosting
        if: always()
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_CEDAR_SETUP_376217 }}"
          channelId: live
          projectId: cedar-setup-376217

      - name: Fail at end if scraper health was bad
        if: always()
        shell: bash
        run: |
          echo "cmd_exit=${{ steps.generate.outputs.cmd_exit }}"
          echo "health_ok=${{ steps.generate.outputs.health_ok }}"
          echo "================ FINAL PYTHON OUTPUT ================"
          cat run_output.log
          echo "===================================================="

          if [ "${{ steps.generate.outputs.cmd_exit }}" != "0" ]; then
            echo "python main.py save exited with a non-zero status"
            exit 1
          fi

          if [ "${{ steps.generate.outputs.health_ok }}" != "true" ]; then
            echo "Health check summary was not 'Failed: 0/X'"
            exit 1
          fi
